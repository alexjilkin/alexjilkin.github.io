title: Alexander "Alex" Zhilkin
description: Personal academic website
url: "https://alex-zhilkin.github.io"
baseurl: ""
lang: en

remote_theme: alshedivat/al-folio
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-socials

navbar_fixed: true
footer_fixed: false
search_enabled: false
bib_search: false
enable_progressbar: false
enable_medium_zoom: false
enable_navbar_social: true

collections:
  papers:
    output: true
    permalink: /papers/:name/

author:
  name: Alexander "Alex" Zhilkin
  email: jilkinalex@gmail.com
  github: alex-zhilkin
  linkedin: alex-zhilkin
  scholar_userid: LKxy80oAAAAJ
  orcid: 0009-0002-7205-1387

socials_in_search: false
max_width: 930px

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - node_modules
