---
layout: default
---
<div class="post simulation-page">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="desc">{{ page.description }}</p>
    {% endif %}
  </header>

  <article>
    <div class="simulation-shell">
      <div class="simulation-copy editorial-body">
        {{ content }}
      </div>

      {% include simulation-panel.liquid %}
    </div>
  </article>
</div>

<script type="module" src="{{ '/assets/js/polymer-demo.js' | relative_url }}"></script>
