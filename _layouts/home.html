---
layout: default
---
<div class="post editorial-home">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="desc">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <article>
    <div class="editorial-body">
      {{ content }}
    </div>
  </article>
</div>

<script type="module" src="{{ '/assets/js/polymer-demo.js' | relative_url }}"></script>
